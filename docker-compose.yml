version: '3.8'

services:
  # Banco de dados PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: discipulus_postgres
    environment:
      POSTGRES_DB: discipulus_v1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: iury1973
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - discipulus_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend Spring Boot
  backend:
    image: discipulus-backend:latest
    container_name: discipulus_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/discipulus_v1
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: iury1973
      SERVER_PORT: 8080
      COM_UNIRIOS_JWTSECRET: bezKoderSecretKey
      COM_UNIRIOS_JWTEXPIRATIONMS: 86400000
    ports:
      - "8080:8080"
    networks:
      - discipulus_network
    restart: unless-stopped

  # Frontend React/Vite
  frontend:
    image: discipulus-frontend:latest
    container_name: discipulus_frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - discipulus_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  discipulus_network:
    driver: bridge 