# Configurações do banco de dados PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:discipulus_v1}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
# Configurações do Hibernate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
server.port=8080
server.address=0.0.0.0

com.unirios.jwtSecret=${JWT_SECRET}
com.unirios.jwtExpirationMs=${JWT_EXPIRATION:86400000}

# ================================
# CONFIGURAÇÕES DO MINIO (STORAGE)
# ================================
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access.key=${MINIO_ACCESS_KEY}
minio.secret.key=${MINIO_SECRET_KEY}
minio.bucket.name=${MINIO_BUCKET:discipulus-bucket}
minio.region=${MINIO_REGION:us-east-1}