events {
    worker_connections 1024;
}

http {
    # Redirecionar HTTP para HTTPS e suportar verificação do Let's Encrypt
    server {
        listen 80;
        server_name discipulus.triadevsolutions.com.br discipulusapi.triadevsolutions.com.br;

        # Desafio ACME para renovação de certificados Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Frontend - discipulus.triadevsolutions.com.br
    server {
        listen 443 ssl;
        server_name discipulus.triadevsolutions.com.br;

        ssl_certificate     /etc/letsencrypt/live/discipulus.triadevsolutions.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/discipulus.triadevsolutions.com.br/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass         http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # Backend API - discipulusapi.triadevsolutions.com.br
    server {
        listen 443 ssl;
        server_name discipulusapi.triadevsolutions.com.br;

        ssl_certificate     /etc/letsencrypt/live/discipulusapi.triadevsolutions.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/discipulusapi.triadevsolutions.com.br/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass         http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 90s;
        }
    }
}
