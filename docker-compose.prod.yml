version: '3.8'

services:
  # Banco de dados PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: discipulus_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-discipulus_v1}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sua_senha_segura_aqui}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - discipulus_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Backend Spring Boot
  backend:
    image: discipulus-backend:latest
    container_name: discipulus_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-discipulus_v1}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-sua_senha_segura_aqui}
      SERVER_PORT: 8080
      COM_UNIRIOS_JWTSECRET: ${JWT_SECRET:-seu_jwt_secret_muito_seguro_aqui}
      COM_UNIRIOS_JWTEXPIRATIONMS: ${JWT_EXPIRATION:-86400000}
    networks:
      - discipulus_network
    restart: unless-stopped

  # Frontend React/Vite
  frontend:
    image: discipulus-frontend:latest
    container_name: discipulus_frontend
    depends_on:
      - backend
    networks:
      - discipulus_network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: discipulus_nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/nginx.conf:ro
      - letsencrypt_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    networks:
      - discipulus_network
    restart: unless-stopped

  # Certbot para certificados SSL Let's Encrypt (renovação automática)
  certbot:
    image: certbot/certbot:latest
    container_name: discipulus_certbot
    volumes:
      - letsencrypt_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM; while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    restart: unless-stopped

volumes:
  postgres_data:
  letsencrypt_certs:
  certbot_webroot:

networks:
  discipulus_network:
    driver: bridge
