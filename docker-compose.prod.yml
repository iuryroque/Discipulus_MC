version: '3.8'

services:
  # Banco de dados PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: discipulus_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-discipulus_v1}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sua_senha_segura_aqui}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - discipulus_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Backend Spring Boot (imagem local)
  backend:
    image: discipulus-backend:latest
    container_name: discipulus_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-discipulus_v1}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-sua_senha_segura_aqui}
      SERVER_PORT: 8080
      COM_UNIRIOS_JWTSECRET: ${JWT_SECRET:-seu_jwt_secret_muito_seguro_aqui}
      COM_UNIRIOS_JWTEXPIRATIONMS: ${JWT_EXPIRATION:-86400000}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - discipulus_network
    restart: unless-stopped

  # Frontend React/Vite (imagem local)
  frontend:
    image: discipulus-frontend:latest
    container_name: discipulus_frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - discipulus_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  discipulus_network:
    driver: bridge 